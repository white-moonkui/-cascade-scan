name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install cascade from source (latest, includes deny_by_default, presets, YAML extends)
          git clone --depth 1 https://github.com/white-moonkui/cascade.git /tmp/cascade
          pip install -e /tmp/cascade
          pip install .[dev]

      - name: Lint with ruff
        run: ruff check src/cascade_scan/

      - name: Test with pytest
        run: pytest --tb=short -q

      - name: Verify CLI
        run: |
          cascade-scan --help
          cascade-scan list-scenarios
          cascade-scan run --probes injection --no-injection -v || true
